name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify CHANGELOG entry
        run: |
          if ! grep -q "## \[${{ steps.version.outputs.VERSION }}\]" CHANGELOG.md; then
            echo "Error: No CHANGELOG entry found for version ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Update SDK package version
        working-directory: sdk
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish SDK to npm
        working-directory: sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        id: release_notes
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | sed '$d' | tail -n +2)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update release with changelog
        run: |
          gh release edit ${{ github.ref_name }} \
            --notes "${{ steps.changelog.outputs.CHANGELOG }}"
        env:
          GH_TOKEN: ${{ github.token }}

  build-artifacts:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli --features opt

      - name: Build contract
        run: |
          cargo build --target wasm32-unknown-unknown --release
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/swiftremit.wasm \
            --wasm-out swiftremit-optimized.wasm

      - name: Upload contract artifact
        run: |
          gh release upload ${{ github.ref_name }} \
            swiftremit-optimized.wasm \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
